<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Transcribe</title>
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --panel-2: #1e222b; --border: #2a2f3a;
      --text: #e6e8ec; --muted: #9aa2b1; --accent: #6ea8fe; --accent-2: #7c5cff; --danger: #ff6b6b;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
      padding: 32px 28px; width: 320px; text-align: center;
    }
    h1 { font-size: 22px; margin: 0 0 4px; }
    p.sub { color: var(--muted); font-size: 13px; margin: 0 0 22px; }
    input {
      width: 100%; background: var(--panel-2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 11px 12px; font-size: 14px; margin-bottom: 12px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      width: 100%; background: var(--accent-2); color: #fff; border: none; border-radius: 8px;
      padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: default; }
    .error { color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 10px; }
  </style>
</head>
<body>
  <form class="card" id="login-form">
    <h1>🎙️ Transcribe</h1>
    <p class="sub">Enter the password to continue</p>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" autofocus />
    <button type="submit" id="submit">Sign in</button>
    <div class="error" id="error"></div>
  </form>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const submit = document.getElementById('submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      submit.disabled = true;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Sign in failed.');
        window.location.href = '/';
      } catch (err) {
        errorEl.textContent = err.message;
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
